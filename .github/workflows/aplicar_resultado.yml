name: Aplicar resultado a results.json

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  apply:
    if: contains(github.event.issue.labels.*.name, 'resultado')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update results.json
        run: |
          node - <<'NODE'
          const fs = require('fs');

          const body = process.env.ISSUE_BODY || "";

          function field(label){
            const re = new RegExp(`### ${label}\\s*\\n([^#\\n][\\s\\S]*?)(\\n\\n###|$)`, 'm');
            const m = body.match(re);
            return m ? m[1].trim() : "";
          }

          const matchId = field("Match ID");
          const set1 = field("Set 1");
          const set2 = field("Set 2");

          if(!matchId) throw new Error("Falta Match ID");
          if(!/^[0-7]-[0-7]$/.test(set1)) throw new Error("Set 1 inválido");
          if(!/^[0-7]-[0-7]$/.test(set2)) throw new Error("Set 2 inválido");

          const [s1a,s1b] = set1.split('-').map(Number);
          const [s2a,s2b] = set2.split('-').map(Number);

          const path = "results.json";
          let data = {};
          if(fs.existsSync(path)) data = JSON.parse(fs.readFileSync(path,'utf8') || "{}");

          data[matchId] = { s1a, s1b, s2a, s2b, updatedAt: new Date().toISOString() };

          fs.writeFileSync(path, JSON.stringify(data, null, 2));
          console.log("OK");
          NODE
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}

      - name: Commit & push
        run: |
          git config user.name "liga-bot"
          git config user.email "actions@users.noreply.github.com"
          git add results.json
          git commit -m "Actualizar results.json desde issue #${{ github.event.issue.number }}" || exit 0
          git push

      - name: Close issue
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          comment: "✅ Resultado aplicado. La web ya muestra la clasificación actualizada."
